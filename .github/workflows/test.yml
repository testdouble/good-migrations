name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: [3.1, 3.2, 3.3, 3.4, 4.0]
        rails: [6.1, "7.0", 7.1, 7.2, "8.0", 8.1]
        exclude:
          - { rails: "8.0", ruby: 3.1 }
          - { rails: "8.1", ruby: 3.1 }

    env:
      RAILS_VERSION: "~> ${{ matrix.rails }}.0"

    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1.313.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: script/test
